<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easebrew Marketplace Daily Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --espresso:#241609;
    --espresso-2:#3A2714;
    --cream:#EDE3D0;
    --paper:#FFFCF6;
    --sage:#556B45;
    --sage-dk:#3E4F33;
    --gold:#C68B2C;
    --clay:#A24B36;
    --ink:#241609;
    --line:#DCD0B6;
    --mono: 'SFMono-Regular', Consolas, 'Roboto Mono', Menlo, monospace;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--cream);color:var(--ink);}
  a{color:inherit;}
  .app{display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{width:230px;flex-shrink:0;background:var(--espresso);color:#F1E9D8;padding:22px 14px;}
  .brand{font-family:var(--serif);font-size:20px;line-height:1.25;margin-bottom:4px;}
  .brand small{display:block;font-family:var(--sans);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#C9B99A;margin-top:6px;}
  .nav{margin-top:28px;list-style:none;padding:0;}
  .nav li{margin-bottom:2px;}
  .nav button{width:100%;text-align:left;background:none;border:none;color:#E5D8BC;padding:9px 10px;border-radius:6px;font-size:13.5px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:8px;}
  .nav button .dot{width:6px;height:6px;border-radius:50%;background:#7A6A4A;flex-shrink:0;}
  .nav button:hover{background:#382512;}
  .nav button.active{background:var(--sage);color:#fff;}
  .nav button.active .dot{background:var(--gold);}
  .sidebar-foot{margin-top:32px;padding-top:16px;border-top:1px solid #4A3620;font-size:11px;color:#B4A180;line-height:1.6;}

  /* Main */
  .main{flex:1;padding:28px 34px 60px;max-width:1180px;}
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
  .topbar h1{font-family:var(--serif);font-size:26px;margin:0;}
  .topbar .sub{font-size:12.5px;color:#6B5A3E;margin-top:4px;}
  .save-note{font-size:11px;color:#7A8A6A;font-family:var(--mono);}

  /* Gauges */
  .gauges{display:flex;gap:16px;margin-bottom:26px;flex-wrap:wrap;}
  .gauge-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:16px;flex:1;min-width:260px;}
  .gauge-ring{position:relative;width:76px;height:76px;flex-shrink:0;}
  .gauge-ring svg{transform:rotate(-90deg);}
  .gauge-ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:bold;}
  .gauge-text .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:#7A6A4A;margin-bottom:3px;}
  .gauge-text .figure{font-family:var(--mono);font-size:17px;}
  .gauge-text .figure .of{font-size:12px;color:#8A7A5A;}

  /* Cards / sections */
  .section{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:20px;}
  .section h2{font-family:var(--serif);font-size:17px;margin:0 0 4px;}
  .section .desc{font-size:12px;color:#7A6A4A;margin-bottom:14px;}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:6px;}
  .stat{border:1px solid var(--line);border-radius:8px;padding:10px 12px;}
  .stat .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#8A7A5A;}
  .stat .v{font-family:var(--mono);font-size:16px;margin-top:3px;}
  .stat .d{font-size:10.5px;margin-top:2px;}
  .down{color:var(--clay);} .up{color:var(--sage-dk);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#8A7A5A;border-bottom:1px solid var(--line);padding:6px 8px;}
  td{padding:4px 6px;border-bottom:1px solid #EEE4CE;}
  td input{width:100%;border:1px solid transparent;background:transparent;font-family:var(--mono);font-size:12.5px;padding:4px 5px;border-radius:4px;}
  td input:hover,td input:focus{border-color:var(--line);background:#fff;outline:none;}
  .row-actions{width:28px;text-align:center;}
  .row-actions button{background:none;border:none;color:var(--clay);cursor:pointer;font-size:14px;}
  .table-tools{display:flex;justify-content:space-between;align-items:center;margin:10px 0 4px;}
  .btn{background:var(--sage);color:#fff;border:none;padding:7px 13px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:var(--sans);}
  .btn.secondary{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn.small{padding:5px 10px;font-size:11.5px;}
  .totals-row td{font-weight:bold;border-top:2px solid var(--ink);border-bottom:none;}
  .empty{font-size:12px;color:#9A8A6A;font-style:italic;padding:14px 4px;}
  canvas{max-height:220px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
  .fee-input-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
  .fee-input-row label{font-size:12px;color:#6B5A3E;}
  .fee-input-row input{font-family:var(--mono);border:1px solid var(--line);border-radius:6px;padding:6px 9px;width:150px;}
  .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--sage);color:#fff;margin-left:8px;vertical-align:middle;}
  .tag.new{background:var(--gold);}
  .view{display:none;} .view.active{display:block;}
  .source-note{font-size:11px;color:#9A8A6A;margin-top:8px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">Easebrew<br>Herbal Coffee<small>Marketplace Daily Report</small></div>
    <ul class="nav" id="navList"></ul>

function voucherDailyHTML(shop){
  const rows = VOUCHER_DAILY[shop.id];
  if(!rows || !rows.length) return '';
  const totSales = rows.reduce((a,r)=>a+r.sales,0);
  const totClaims = rows.reduce((a,r)=>a+r.claims,0);
  const totOrders = rows.reduce((a,r)=>a+r.orders,0);
  const totCost = rows.reduce((a,r)=>a+r.cost,0);
  const body = rows.map(r=>`<tr>
    <td>${r.date}</td>
    <td>${peso(r.sales)}</td>
    <td>${r.claims.toLocaleString('en-PH')}</td>
    <td>${r.orders.toLocaleString('en-PH')}</td>
    <td>${r.usageRate.toFixed(2)}%</td>
    <td>${r.buyers.toLocaleString('en-PH')}</td>
    <td>${peso(r.cost)}</td>
  </tr>`).join('');
  return `<div class="section">
    <h2>Voucher Center — Daily Breakdown, ${shop.name}</h2>
    <div class="desc">Per-day voucher usage (Confirmed Order figures): how many claimed/ordered using a voucher that day, and how much sales it drove. This is separate from "Voucher Cost" in the Daily data table above, which comes from the Income Report (different methodology — see note above).</div>
    <table>
      <thead><tr><th>Date</th><th>Sales</th><th>Claims</th><th>Orders (Used)</th><th>Usage Rate</th><th>Buyers</th><th>Voucher Cost</th></tr></thead>
      <tbody>${body}
        <tr class="totals-row"><td>Total</td><td>${peso(totSales)}</td><td>${totClaims.toLocaleString('en-PH')}</td><td>${totOrders.toLocaleString('en-PH')}</td><td></td><td></td><td>${peso(totCost)}</td></tr>
      </tbody>
    </table>
  </div>`;
}

let state = {}; // shopId -> {rows:[], monthlyFees:{...}}

function peso(n){ n = Number(n)||0; return '₱' + n.toLocaleString('en-PH',{maximumFractionDigits:0}); }
function pct(n){ return (Number(n)||0).toFixed(1) + '%'; }
function setSaveNote(txt, ok=true){
  const el = document.getElementById('saveNote');
  el.textContent = (ok?'●  ':'●  ') + txt;
  el.style.color = ok ? '#556B45' : '#A24B36';
}

// One-time patch: voucher cost per day, now available from Income Report / Income Statement
// exports. Applied only to rows that still have voucherCost 0/blank for a matching date —
// never overwrites sales, fees, or any row you've already edited or added yourself.
const PATCH_VOUCHER_COST = {
  shopeemain: {'2026-07-01':491,'2026-07-02':263,'2026-07-03':281,'2026-07-04':496,'2026-07-05':220,'2026-07-06':70,'2026-07-07':60,'2026-07-08':40,'2026-07-09':40,'2026-07-10':20,'2026-07-11':20,'2026-07-12':20,'2026-07-13':20,'2026-07-14':0,'2026-07-15':20,'2026-07-16':0,'2026-07-17':0},
  tiktok: {'2026-07-01':3803.52,'2026-07-02':3973.43,'2026-07-03':3294.96,'2026-07-04':3650.81,'2026-07-05':3417.60,'2026-07-06':3835.70,'2026-07-07':4092.31,'2026-07-08':4475.72,'2026-07-09':3357.77,'2026-07-10':3161.25,'2026-07-11':4277.48,'2026-07-12':4005.40,'2026-07-13':3043.61,'2026-07-14':2433.56,'2026-07-15':2320.36,'2026-07-16':3468.85,'2026-07-17':2642.15},
};
function applyVoucherPatch(id){
  const patch = PATCH_VOUCHER_COST[id];
  if(!patch || !state[id]?.rows) return;
  let changed = false;
  state[id].rows.forEach(r=>{
    if(patch[r.date]!==undefined && !Number(r.voucherCost)){
      r.voucherCost = patch[r.date];
      changed = true;
    }
  });
  return changed;
}

async function loadShop(id){
  try{
    const r = await window.storage.get('rows:'+id);
    state[id] = state[id] || {};
    state[id].rows = r ? JSON.parse(r.value) : [];
  }catch(e){ state[id] = state[id]||{}; state[id].rows = []; }
  if((!state[id].rows || state[id].rows.length===0) && SEED_ROWS[id]){
    state[id].rows = SEED_ROWS[id].map(r=>({...r}));
    try{ await window.storage.set('rows:'+id, JSON.stringify(state[id].rows), false); }catch(e){}
  }
  if(applyVoucherPatch(id)){
    try{ await window.storage.set('rows:'+id, JSON.stringify(state[id].rows), false); }catch(e){}
  }
  try{
    const f = await window.storage.get('monthlyfees2:'+id);
    if(f){
      state[id].monthlyFees = JSON.parse(f.value);
    } else {
      state[id].monthlyFees = SEED_MONTHLY_FEES[id] ? {...SEED_MONTHLY_FEES[id]} : {amount:0, note:''};
      try{ await window.storage.set('monthlyfees2:'+id, JSON.stringify(state[id].monthlyFees), false); }catch(e){}
    }
  }catch(e){ state[id].monthlyFees = SEED_MONTHLY_FEES[id] ? {...SEED_MONTHLY_FEES[id]} : {amount:0, note:''}; }
}

async function saveRows(id){
  setSaveNote('saving…');
  try{
    await window.storage.set('rows:'+id, JSON.stringify(state[id].rows), false);
    setSaveNote('saved');
  }catch(e){ setSaveNote('save failed', false); }
}
async function saveMonthlyFees(id){
  setSaveNote('saving…');
  try{
    await window.storage.set('monthlyfees2:'+id, JSON.stringify(state[id].monthlyFees), false);
    setSaveNote('saved');
  }catch(e){ setSaveNote('save failed', false); }
}

function ringSVG(percent, color){
  const p = Math.max(0, Math.min(100, percent));
  const r = 32, c = 2*Math.PI*r;
  const dash = (p/100)*c;
  return `<svg width="76" height="76" viewBox="0 0 76 76">
    <circle cx="38" cy="38" r="${r}" fill="none" stroke="#EEE4CE" stroke-width="7"/>
    <circle cx="38" cy="38" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${dash} ${c}" stroke-linecap="round"/>
  </svg><div class="val">${Math.round(p)}%</div>`;
}

function allDailyRows(){
  let all = [];
  SHOPS.forEach(s=>{ (state[s.id]?.rows||[]).forEach(r=> all.push({...r, shop:s.id})); });
  return all;
}

function computeTotals(){
  const rows = allDailyRows();
  let sales=0, voucherCost=0, fees=0;
  rows.forEach(r=>{ sales += Number(r.sales)||0; voucherCost += Number(r.voucherCost)||0; fees += Number(r.fees)||0; });
  SHOPS.forEach(s=>{ fees += Number(state[s.id]?.monthlyFees?.amount)||0; });
  fees += COMPANY_OPEX;
  const cost = voucherCost + fees;
  const margin = sales>0 ? ((sales-cost)/sales*100) : 0;
  return {sales, voucherCost, fees, margin};
}

function renderGauges(){
  const t = computeTotals();
  document.getElementById('ringSales').innerHTML = ringSVG((t.sales/4000000)*100, '#C68B2C');
  document.getElementById('ringMargin').innerHTML = ringSVG((t.margin/8)*100, '#556B45');
  document.getElementById('salesFigure').innerHTML = `${peso(t.sales)} <span class="of">/ ₱4,000,000</span>`;
  document.getElementById('marginFigure').innerHTML = `${pct(t.margin)} <span class="of">/ 8% target</span>`;
}

/* ---------- Views ---------- */
let charts = {};

function shopSummaryHTML(shop){
  const groups = shop.summaryGroups;
  if(!groups || !groups.length){
    return `<div class="section"><h2>Report period summary</h2>
      <div class="empty">No summary imported yet for ${shop.full}. Send the Shopee/Lazada/TikTok screenshots or export and I'll add it here.</div></div>`;
  }
  const grid = arr => arr.map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
  return `<div class="section">
    <h2>Report period summary</h2>
    <div class="desc">From your uploaded exports — figures shown as reported by the platform</div>
    ${groups.map(g=>`<div style="margin-top:10px">
      <div style="font-size:12.5px;font-weight:bold;color:#4A3A22;margin-bottom:6px">${g.title}</div>
      <div class="summary-grid">${grid(g.stats)}</div>
    </div>`).join('')}
  </div>`;
}

function dailyTableHTML(shop){
  const rows = state[shop.id]?.rows || [];
  const extraCol = shop.hasLive ? `<th>Live Sales (₱)</th>` : '';
  let body = '';
  if(rows.length===0){
    body = `<tr><td colspan="${shop.hasLive?6:5}"><div class="empty">No daily rows yet. Click "Add day" to start entering data as your exports come in.</div></td></tr>`;
  } else {
    rows.forEach((r,i)=>{
      body += `<tr data-i="${i}">
        <td><input type="date" value="${r.date||''}" onchange="updateCell('${shop.id}',${i},'date',this.value)"></td>
        <td><input type="text" inputmode="decimal" value="${peso(r.sales||0)}" onfocus="this.value=(${Number(r.sales)||0})" onblur="this.value=peso(this.value)" onchange="updateCell('${shop.id}',${i},'sales',this.value)"></td>
        <td><input type="text" inputmode="decimal" value="${peso(r.voucherCost||0)}" onfocus="this.value=(${Number(r.voucherCost)||0})" onblur="this.value=peso(this.value)" onchange="updateCell('${shop.id}',${i},'voucherCost',this.value)"></td>
        <td><input type="text" inputmode="decimal" value="${peso(r.fees||0)}" onfocus="this.value=(${Number(r.fees)||0})" onblur="this.value=peso(this.value)" onchange="updateCell('${shop.id}',${i},'fees',this.value)"></td>
        ${shop.hasLive?`<td><input type="text" inputmode="decimal" value="${peso(r.liveSales||0)}" onfocus="this.value=(${Number(r.liveSales)||0})" onblur="this.value=peso(this.value)" onchange="updateCell('${shop.id}',${i},'liveSales',this.value)"></td>`:''}
        <td class="row-actions"><button onclick="deleteRow('${shop.id}',${i})" title="Delete row">✕</button></td>
      </tr>`;
    });
  }
  const totS = rows.reduce((a,r)=>a+(Number(r.sales)||0),0);
  const totV = rows.reduce((a,r)=>a+(Number(r.voucherCost)||0),0);
  const totF = rows.reduce((a,r)=>a+(Number(r.fees)||0),0);
  const totL = rows.reduce((a,r)=>a+(Number(r.liveSales)||0),0);
  return `<div class="section">
    <h2>Daily data — ${shop.name}</h2>
    <div class="desc">Enter each day's sales, voucher cost and fees & charges. Totals and charts update automatically.</div>
    ${shop.dailyNote ? `<div class="source-note" style="margin-bottom:10px">${shop.dailyNote}</div>` : ''}
    <div class="table-tools">
      <button class="btn small" onclick="addRow('${shop.id}')">+ Add day</button>
      <span class="save-note" style="font-size:11px;color:#9A8A6A">${rows.length} day(s) logged</span>
    </div>
    <table>
      <thead><tr><th>Date</th><th>Sales</th><th>Voucher Cost</th><th>Fees &amp; Charges</th>${extraCol}<th></th></tr></thead>
      <tbody>${body}
        ${rows.length? `<tr class="totals-row"><td>Total</td><td>${peso(totS)}</td><td>${peso(totV)}</td><td>${peso(totF)}</td>${shop.hasLive?`<td>${peso(totL)}</td>`:''}<td></td></tr>`:''}
      </tbody>
    </table>
    <div class="two-col" style="margin-top:16px">
      <div><canvas id="chart_sales_${shop.id}"></canvas></div>
      <div><canvas id="chart_cost_${shop.id}"></canvas></div>
    </div>
  </div>`;
}

function monthlyFeesHTML(shop){
  const mf = state[shop.id]?.monthlyFees || {amount:0, note:''};
  return `<div class="section">
    <h2>Monthly fees &amp; charges — ${shop.name}</h2>
    <div class="desc">Use this if your platform only gives you one fees total for the whole month (e.g. Income/Payout report), instead of a daily breakdown.</div>
    <div class="fee-input-row">
      <label>Total for the month</label>
      <input type="number" step="1" value="${mf.amount}" onchange="updateMonthlyFee('${shop.id}','amount',this.value)">
      <label>Note</label>
      <input type="text" style="width:280px" value="${mf.note||''}" placeholder="e.g. transaction fee + service fee + payment fee" onchange="updateMonthlyFee('${shop.id}','note',this.value)">
    </div>
    <div class="source-note">This amount is included in the overall margin calculation above.</div>
  </div>`;
}

function renderShopView(shop){
  return `${shopSummaryHTML(shop)}${voucherDailyHTML(shop)}${dailyTableHTML(shop)}${monthlyFeesHTML(shop)}`;
}

function renderOverview(){
  const rows = allDailyRows();
  const dates = [...new Set(rows.map(r=>r.date))].filter(Boolean).sort();
  const byDate = {};
  dates.forEach(d=>byDate[d]=0);
  rows.forEach(r=>{ if(r.date) byDate[r.date] = (byDate[r.date]||0) + (Number(r.sales)||0); });
  const hasData = dates.length>0;
  const t = computeTotals();
  return `
  <div class="section">
    <h2>Combined daily sales — Shopee + Lazada + TikTok</h2>
    <div class="desc">Sum of all shops' daily sales entered so far. Add daily rows in each shop tab to populate this.</div>
    ${hasData ? '<canvas id="chart_overview" height="90"></canvas>' : '<div class="empty">No daily sales entered yet across any shop. Go to a shop tab and click "Add day" to begin, or send me the per-day export and I\'ll fill it in for you.</div>'}
  </div>
  <div class="section">
    <h2>Cost breakdown so far</h2>
    <div class="summary-grid">
      <div class="stat"><div class="k">Total Sales Logged</div><div class="v">${peso(t.sales)}</div></div>
      <div class="stat"><div class="k">Total Voucher Cost</div><div class="v">${peso(t.voucherCost)}</div></div>
      <div class="stat"><div class="k">Total Fees &amp; Charges</div><div class="v">${peso(t.fees)}</div></div>
      <div class="stat"><div class="k">— incl. Company OPEX (unallocated)</div><div class="v">${peso(COMPANY_OPEX)}</div></div>
      <div class="stat"><div class="k">Operating Margin</div><div class="v">${pct(t.margin)}</div></div>
    </div>
    <div class="source-note">Margin here = (Sales − Voucher Cost − Fees) ÷ Sales. "Total Fees & Charges" combines: (1) each shop's own daily "Fees" column, (2) the July 2026 Finance Income Statement's COGS + Sales Discount + ADS entered as each shop's Monthly fees & charges — see the Shopee (Combined), Lazada, and TikTok tabs — and (3) company-wide OPEX of ${peso(COMPANY_OPEX)}. Finance's own "Fees & Charges" line is intentionally left out of the monthly bucket since it's already covered by (1), to avoid double-counting.</div>
  </div>
  <div class="section">
    <h2>What's still needed</h2>
    <div class="desc">To complete this dashboard, send:</div>
    <ul style="font-size:12.5px;color:#4A3A22;line-height:1.8;margin:0;padding-left:18px">
      <li>Lazada (LazMall) — daily sales export</li>
      <li>TikTok Shop — daily sales export, with LIVE sales split out</li>
      <li>Fees &amp; Charges — per-shop, from Income/Payout report or Order Details export (per day or per month)</li>
      <li>Daily (not just period-total) voucher data for Shopee Main and Herbal PH, if available per day</li>
    </ul>
  </div>`;
}

function drawCharts(){
  Object.values(charts).forEach(c=>c.destroy());
  charts = {};
  const rows = allDailyRows();
  const dates = [...new Set(rows.map(r=>r.date))].filter(Boolean).sort();
  if(currentView==='overview' && dates.length){
    const byDate = {}; dates.forEach(d=>byDate[d]=0);
    rows.forEach(r=>{ if(r.date) byDate[r.date]+= Number(r.sales)||0; });
    const ctx = document.getElementById('chart_overview');
    if(ctx) charts.overview = new Chart(ctx, {type:'line', data:{labels:dates, datasets:[{label:'Combined Sales', data:dates.map(d=>byDate[d]), borderColor:'#556B45', backgroundColor:'rgba(85,107,69,0.12)', fill:true, tension:.3}]}, options:{plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>'₱'+v.toLocaleString()}}}}});
  }
  const shop = SHOPS.find(s=>s.id===currentView);
  if(shop){
    const srows = state[shop.id]?.rows||[];
    const sd = srows.map(r=>r.date);
    const salesEl = document.getElementById('chart_sales_'+shop.id);
    if(salesEl){
      const datasets = [{label:'Sales', data:srows.map(r=>Number(r.sales)||0), borderColor:'#C68B2C', backgroundColor:'rgba(198,139,44,0.12)', fill:true, tension:.3}];
      if(shop.hasLive) datasets.push({label:'Live Sales', data:srows.map(r=>Number(r.liveSales)||0), borderColor:'#A24B36', backgroundColor:'rgba(162,75,54,0.12)', fill:true, tension:.3});
      charts['sales_'+shop.id] = new Chart(salesEl, {type:'line', data:{labels:sd, datasets}, options:{plugins:{title:{display:true,text:'Sales trend'}}, scales:{y:{ticks:{callback:v=>'₱'+v.toLocaleString()}}}}});
    }
    const costEl = document.getElementById('chart_cost_'+shop.id);
    if(costEl){
      charts['cost_'+shop.id] = new Chart(costEl, {type:'bar', data:{labels:sd, datasets:[
        {label:'Voucher Cost', data:srows.map(r=>Number(r.voucherCost)||0), backgroundColor:'#556B45'},
        {label:'Fees & Charges', data:srows.map(r=>Number(r.fees)||0), backgroundColor:'#A24B36'}
      ]}, options:{plugins:{title:{display:true,text:'Voucher cost & fees'}}, scales:{y:{ticks:{callback:v=>'₱'+v.toLocaleString()}},x:{stacked:true},y0:{stacked:true}}}});
    }
  }
}

/* ---------- interactions ---------- */
window.updateCell = function(shopId, i, field, val){
  state[shopId].rows[i][field] = (field==='date') ? val : Number(String(val).replace(/[₱,\s]/g,'')) || 0;
  saveRows(shopId).then(()=>{ renderGauges(); renderView(currentView); });
};
window.deleteRow = function(shopId, i){
  state[shopId].rows.splice(i,1);
  saveRows(shopId).then(()=>{ renderGauges(); renderView(currentView); });
};
window.addRow = function(shopId){
  state[shopId].rows.push({date:'', sales:0, voucherCost:0, fees:0, liveSales:0});
  saveRows(shopId).then(()=>renderView(currentView));
};
window.updateMonthlyFee = function(shopId, field, val){
  state[shopId].monthlyFees[field] = (field==='amount') ? Number(val) : val;
  saveMonthlyFees(shopId).then(()=>{ renderGauges(); });
};

let currentView = 'overview';
function renderView(id){
  currentView = id;
  document.querySelectorAll('.nav button').forEach(b=> b.classList.toggle('active', b.dataset.id===id));
  const host = document.getElementById('viewsHost');
  const shop = SHOPS.find(s=>s.id===id);
  document.getElementById('viewTitle').textContent = shop ? shop.name : 'Overview';
  document.getElementById('viewSub').textContent = shop ? shop.full : 'Combined performance across all marketplaces';
  host.innerHTML = shop ? renderShopView(shop) : renderOverview();
  renderGauges();
  try{ drawCharts(); }catch(e){ console.error('Chart render failed (data is still correct):', e); }
}

function buildNav(){
  const nav = document.getElementById('navList');
  const items = [{id:'overview', name:'Overview'}, ...SHOPS];
  nav.innerHTML = items.map(it=>`<li><button data-id="${it.id}" onclick="renderView('${it.id}')"><span class="dot"></span>${it.name}</button></li>`).join('');
}

async function init(){
  buildNav();
  for(const s of SHOPS){ await loadShop(s.id); }
  renderGauges();
  renderView('overview');
}
init();
</script>
